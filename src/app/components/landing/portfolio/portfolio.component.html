<div class="min-h-screen flex flex-col bg-base-200">
  <!-- Navigation Bar -->
  <nav class="fixed top-0 w-full bg-base-100/80 backdrop-blur border-b border-base-300 z-50 animate-slide-in-left">
    <div class="max-w-7xl mx-auto flex items-center justify-between py-3 px-4 sm:px-6">
      <!-- Logo -->
      

      <!-- Hamburger Menu for Mobile -->
      <div class="md:hidden cursor-pointer" (click)="toggleMenu()" aria-label="Toggle navigation">
        <svg
          class="h-8 w-8 text-base-content"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16m-7 6h7"
          />
        </svg>
      </div>

      <!-- Navigation Links -->
      <div class="hidden md:flex items-center justify-center gap-2 w-full">
        <a
          routerLink="/"
          class="btn btn-ghost btn-sm uppercase"
        >
          Home
        </a>
        <a
          (click)="scrollToElement('about')"
          class="btn btn-ghost btn-sm uppercase"
        >
          About
        </a>
        <a
          (click)="scrollToElement('skills')"
          class="btn btn-ghost btn-sm uppercase"
        >
          Skills
        </a>
        <a
          (click)="scrollToElement('projects')"
          class="btn btn-ghost btn-sm uppercase"
        >
          Projects
        </a>
        <a
          routerLink="/resume-view"
          class="btn btn-ghost btn-sm uppercase"
        >
          Resume
        </a>
        <a
          (click)="scrollToElement('contact-me')"
          class="btn btn-ghost btn-sm uppercase"
        >
          Contact
        </a>
        <a
          routerLink="/developer-mode"
          class="btn btn-primary btn-sm uppercase"
        >
          Dev Mode
        </a>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div
      class="md:hidden bg-base-100/95 backdrop-blur transition duration-300"
      [ngClass]="{ hidden: !isMenuOpen, block: isMenuOpen }"
    >
      <div class="flex flex-col space-y-4 p-4">
        <a
          routerLink="/"
          class="btn btn-ghost btn-sm justify-start uppercase"
          (click)="closeMenu()"
        >
          Home
        </a>
        <a
          (click)="scrollToElement('about')"
          class="btn btn-ghost btn-sm justify-start uppercase"
        >
          About
        </a>
        <a
          (click)="scrollToElement('skills')"
          class="btn btn-ghost btn-sm justify-start uppercase"
        >
          Skills
        </a>
        <a
          (click)="scrollToElement('projects')"
          class="btn btn-ghost btn-sm justify-start uppercase"
        >
          Projects
        </a>
        <a
          routerLink="/resume-view"
          class="btn btn-ghost btn-sm justify-start uppercase"
          (click)="closeMenu()"
        >
          Resume
        </a>
        <a
          (click)="scrollToElement('contact-me')"
          class="btn btn-ghost btn-sm justify-start uppercase"
        >
          Contact
        </a>
        <a
          routerLink="/developer-mode"
          class="btn btn-primary btn-sm justify-start uppercase"
          (click)="closeMenu()"
        >
          Dev Mode
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow pt-16">
    <!-- Profile Section -->
    <section id="profile" class="min-h-screen flex items-center justify-center bg-base-200 animate-slide-in-right">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <app-profile></app-profile>
      </div>
    </section>

    <!-- About Section -->
    <section id="about" class="min-h-screen flex items-center justify-center bg-base-100">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <app-about></app-about>
      </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="min-h-screen flex items-center justify-center bg-base-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <app-skills></app-skills>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="min-h-screen flex items-center justify-center bg-base-100">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <app-projects></app-projects>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact-me" class="min-h-screen flex items-center justify-center bg-base-200">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <app-contact-me></app-contact-me>
      </div>
    </section>
  </main>
</div>
