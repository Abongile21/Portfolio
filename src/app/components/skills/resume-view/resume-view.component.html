<div class="min-h-screen bg-base-200 p-6 flex flex-col items-center">

  <!-- Header -->
  <div class="w-full max-w-5xl flex flex-col sm:flex-row justify-between items-center mb-8 bg-base-100/80 backdrop-blur-lg p-5 rounded-2xl shadow-2xl border border-base-300">
   
    <!-- Controls -->
    <div class="flex flex-col sm:flex-row items-center gap-4 w-full sm:w-auto">

      <!-- Zoom Controls -->
      <div class="flex items-center gap-3 bg-base-200/80 px-4 py-2 rounded-xl shadow-inner w-full sm:w-auto">
        <button (click)="zoomOut()" class="btn btn-primary btn-circle btn-sm" aria-label="Zoom out">-</button>

        <input type="range" min="0.5" max="2" step="0.1" [(ngModel)]="zoom" class="range range-primary w-32" />

        <button (click)="zoomIn()" class="btn btn-primary btn-circle btn-sm" aria-label="Zoom in">+</button>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-3">
        <button (click)="downloadResume()" class="btn btn-primary">
          <i class="fas fa-download mr-2"></i> Download
        </button>
        <button (click)="goBack()" class="btn btn-error">
          <i class="fas fa-sign-out-alt mr-2"></i> Exit
        </button>
      </div>

    </div>
  </div>

  <!-- PDF Viewer -->
  <div class="w-full max-w-5xl flex-grow flex justify-center items-center bg-base-100/70 backdrop-blur-md rounded-2xl shadow-2xl border border-base-300 p-4">
    <div class="w-full bg-base-200/80 rounded-xl p-2 sm:p-4 shadow-inner">
      <pdf-viewer
        [src]="pdfSrc"
        [zoom]="zoom || 1.0"
        [original-size]="true"
        [fit-to-page]="true"
        [show-all]="true"
        [render-text]="true"
        style="width: 100%; height: 80vh; object-fit: contain;"
        class="rounded-lg"
      ></pdf-viewer>
    </div>
  </div>

</div>
