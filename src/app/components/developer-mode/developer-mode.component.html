<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">

  <div class="w-full max-w-6xl bg-base-100 rounded-lg shadow-2xl border border-base-300 overflow-hidden">

    <!-- Header -->
    <div class="flex items-center justify-between bg-base-200 px-4 py-2 border-b border-base-300">
      <div class="text-xs md:text-sm font-semibold tracking-wide text-base-content/70">
        NyakatyaOS Terminal — Developer Mode
      </div>
      <button
        routerLink="/portfolio"
        title="Close"
        class="w-8 h-6 flex items-center justify-center text-2xl hover:bg-error hover:text-error-content transition-all rounded">
        &times;
      </button>
    </div>

    <!-- Body -->
    <div class="flex flex-col md:flex-row p-4 gap-4 bg-base-100">

      <!-- Terminal Window -->
      <div class="bg-base-300 rounded-md p-4 w-full md:w-1/2 border border-base-300 shadow-inner">
        <div class="h-64 overflow-y-auto border-b border-base-300 pb-4 font-mono text-sm custom-scrollbar">
          <p *ngFor="let line of output" class="text-base-content/80 tracking-wide">
            {{ line }}
          </p>
        </div>
        <div class="flex items-center mt-3">
          <span class="text-primary font-mono">$</span>
          <input
            type="text"
            [(ngModel)]="command"
            (keydown.enter)="executeCommand()"
            placeholder="Type command..."
            class="ml-2 flex-1 bg-transparent text-base-content font-mono placeholder:text-base-content/40 focus:outline-none focus:ring-1 focus:ring-primary px-1"
            autofocus>
        </div>
      </div>

      <!-- Output Display Area -->
      <div
        class="bg-base-200 rounded-md p-4 w-full md:w-1/2 border border-base-300 transition-all duration-300 ease-in-out"
        [ngClass]="{
          'h-48 flex items-center justify-center text-base-content/50': !activeTab,
          'h-96 overflow-y-auto': activeTab
        }"
      >
        <ng-container [ngSwitch]="activeTab">

          <ng-container *ngSwitchCase="'about'">
            <app-about class="w-full h-full animate-fade-in"></app-about>
          </ng-container>

          <ng-container *ngSwitchCase="'skills'">
            <app-skills class="w-full h-full animate-fade-in"></app-skills>
          </ng-container>

          <ng-container *ngSwitchCase="'projects'">
            <app-projects class="w-full h-full animate-fade-in"></app-projects>
          </ng-container>

          <ng-container *ngSwitchCase="'contacts'">
            <app-contact class="w-full h-full animate-fade-in"></app-contact>
          </ng-container>

          <ng-container *ngSwitchCase="'contact-me'">
            <app-contact-me class="w-full h-full animate-fade-in"></app-contact-me>
          </ng-container>

          <ng-container *ngSwitchDefault>
            <p class="text-base-content/50 font-mono text-sm italic">Type <span class="text-primary">'help'</span> to get started.</p>
          </ng-container>

        </ng-container>
      </div>

    </div>
  </div>
</div>
